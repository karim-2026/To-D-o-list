<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>

    <!-- Bootstrap -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    />

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <link rel="manifest" href="manifest.json" />
  </head>

  <body>
    <div class="container mt-5">
      <h2 class="text-center mb-4">My Todo List</h2>

      <div class="input-group mb-3">
        <input
          type="text"
          id="taskinput"
          class="form-control"
          placeholder="Enter your task"
        />
        <input type="time" id="tasktime" class="form-control" />
        <button id="addbtn" class="btn btn-secondary">Add</button>
      </div>

      <!-- Progress Bar -->
      <div class="progress mb-3">
        <div
          class="progress-bar bg-success progress-bar-striped progress-bar-animated"
          style="width: 0%"
        ></div>
      </div>

      <p>
        Total: <span id="count">0</span> | ✅ Done:
        <span id="doneCount">0</span> | ❌ Pending:
        <span id="pendingCount">0</span>
      </p>

      <ul id="tasklist" class="list-group"></ul>

      <button id="clearAll" class="btn btn-danger mt-3">Clear All</button>
    </div>

    <!-- Alarm sound -->
    <audio id="alarmSound">
      <source
        src="https://www.soundjay.com/buttons/sounds/beep-07.mp3"
        type="audio/mpeg"
      />
    </audio>

    <script>
      $(document).ready(function () {
        let total = 0;
        let completed = 0;

        function updateUI() {
          $("#count").text(total);
          $("#doneCount").text(completed);
          $("#pendingCount").text(total - completed);

          let percent = total === 0 ? 0 : (completed / total) * 100;

          $(".progress-bar")
            .css("width", percent + "%")
            .attr("aria-valuenow", percent);
        }

        function checkAlarms() {
          let now = new Date();
          let currentTime = now.toTimeString().slice(0, 5);

          $(".task-time").each(function () {
            let taskTime = $(this).data("time");

            if (taskTime === currentTime && !$(this).data("triggered")) {
              $(this).data("triggered", true);
              $("#alarmSound")[0].play();
              alert("⏰ Task time: " + $(this).text());
            }
          });
        }

        setInterval(checkAlarms, 1000);

        // Add task
        $("#addbtn").click(function () {
          let task = $("#taskinput").val().trim();
          let time = $("#tasktime").val();

          if (task !== "") {
            $("#tasklist").append(`
            <li class="list-group-item d-flex justify-content-between align-items-center">
              <div>
                <span>${task}</span>
                ${time ? `<small class="text-muted task-time ms-2" data-time="${time}">(${time})</small>` : ""}
              </div>
              <div>
                <button class="done btn btn-success btn-sm">Done</button>
                <button class="delete btn btn-danger btn-sm">Delete</button>
              </div>
            </li>
          `);

            $("#taskinput").val("");
            $("#tasktime").val("");

            total++;
            updateUI();
          }
        });

        // Enter key
        $("#taskinput").keypress(function (e) {
          if (e.which === 13) {
            $("#addbtn").click();
          }
        });

        // Toggle done (color only)
        $(document).on("click", ".done", function () {
          let li = $(this).closest("li");

          if (li.hasClass("list-group-item-success")) {
            li.removeClass("list-group-item-success");
            completed--;
          } else {
            li.addClass("list-group-item-success");
            completed++;
          }

          updateUI();
        });

        // Delete
        $(document).on("click", ".delete", function () {
          let li = $(this).closest("li");

          if (li.hasClass("list-group-item-success")) {
            completed--;
          }

          li.remove();
          total--;
          updateUI();
        });

        // Clear all
        $("#clearAll").click(function () {
          $("#tasklist").empty();
          total = 0;
          completed = 0;
          updateUI();
        });
      });
    </script>
  </body>
</html>
