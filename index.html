<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>

    <!-- Bootstrap -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    />

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  </head>

  <body>
    <div class="container mt-5">
      <h2 class="text-center mb-4">My Todo List</h2>

      <div class="input-group mb-3">
        <input
          type="text"
          id="taskinput"
          class="form-control"
          placeholder="Enter your task"
        />
        <button id="addbtn" class="btn btn-secondary">Add</button>
      </div>

      <!-- Progress Bar -->
      <div class="progress mb-3">
        <div
          class="progress-bar bg-success progress-bar-striped progress-bar-animated"
          style="width: 0%"
        ></div>
      </div>

      <p>Total tasks: <span id="count">0</span></p>

      <ul id="tasklist" class="list-group"></ul>

      <button id="clearAll" class="btn btn-danger mt-3">Clear All</button>
    </div>

    <script>
      $(document).ready(function () {
        let total = 0;
        let completed = 0;

        function updateUI() {
          $("#count").text(total);

          let percent = total === 0 ? 0 : (completed / total) * 100;

          $(".progress-bar")
            .css("width", percent + "%")
            .attr("aria-valuenow", percent);
        }

        // Add task
        $("#addbtn").click(function () {
          let task = $("#taskinput").val().trim();

          if (task !== "") {
            $("#tasklist").append(`
              <li class="list-group-item d-flex justify-content-between align-items-center">
                <span>${task}</span>
                <div>
                  <button class="done btn btn-success btn-sm">Done</button>
                  <button class="delete btn btn-danger btn-sm">Delete</button>
                </div>
              </li>
            `);

            $("#taskinput").val("");
            total++;
            updateUI();
          }
        });

        // Press Enter
        $("#taskinput").keypress(function (e) {
          if (e.which === 13) {
            $("#addbtn").click();
          }
        });

        // Mark as done
        $(document).on("click", ".done", function () {
          let li = $(this).closest("li");

          if (li.hasClass("list-group-item-success")) {
            li.removeClass("list-group-item-success");
            completed--;
          } else {
            li.addClass("list-group-item-success");
            completed++;
          }

          updateUI();
        });

        // Delete task
        $(document).on("click", ".delete", function () {
          let li = $(this).closest("li");

          if (li.hasClass("list-group-item-success")) {
            completed--;
          }

          li.remove();
          total--;
          updateUI();
        });

        // Clear all
        $("#clearAll").click(function () {
          $("#tasklist").empty();
          total = 0;
          completed = 0;
          updateUI();
        });
      });
    </script>
  </body>
</html>
